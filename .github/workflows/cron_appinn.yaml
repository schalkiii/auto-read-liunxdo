name: cron_appinn

on:
  schedule:
    # 每天 UTC 时间 18:00 运行
    - cron: "0 18 * * *"
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 20 # 设置作业超时时间为20分钟

    strategy:
      matrix:
        node-version: [20.x]

    env:
      # 在作业级别设置环境变量
      USERNAMES: ${{ secrets.USERNAMES_APPINN }}
      PASSWORDS: ${{ secrets.PASSWORDS_APPINN }}
      WEBSITE: ${{ secrets.WEBSITE_APPINN }}

    steps:
      - uses: actions/checkout@v3 # 检出仓库
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Echo environment variables
        run: |
          echo "USERNAMES: $USERNAMES"
          echo "PASSWORDS: $PASSWORDS"
          echo "WEBSITE: $WEBSITE"

      - name: Install dependencies
        run: npm install # 安装 package.json 中的依赖项
      - name: Run a script
        run: node bypasscf.js # 替换为你想运行的脚本的实际名称
